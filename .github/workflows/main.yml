name: generate pacman game

on:
  schedule: # Roda automaticamente a cada 24 horas
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite que você rode manualmente quando quiser
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: hrsonn

      # Envia o arquivo gerado para uma "branch" separada chamada 'output'
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
